services:
  hugobank-callcenter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hugobank-callcenter
    ports:
      - "7033:7033"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recordings:/app/recordings
      - ./pages:/app/pages
      - ./backend/data/chroma:/app/backend/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7033/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
